<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>mdtwiki-自动配图标</title>
    <script src="main.js"></script>
</head>

<body>
    <h1>自动配图标工具</h1>
    <p>请在输入框输入要转换的文本，然后点击“转换”按钮。</p>
    <hr>
    <p>输入文本</p>
    <!-- <input id="inputF" type="file"></body><br> -->
    <textarea id="inputT" style="resize: vertical; width: 90%; height: 200px"></textarea><br>
    <button onclick="go()" style="width: 90%; height: 40px; font-size: 20px;">自动配图标</button>
    <div id="statusDisplay"></div>
    <hr>
    <p>输出文本</p>
    <textarea id="outputT" style="resize: none; width: 90%; height: 200px"></textarea>
</body>

</html>
